services:
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    ports:
      - "${PORT:-3001}:${PORT:-3001}"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL:-}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      PLATFORM_URL: ${PLATFORM_URL}
      WEB_URL: ${WEB_URL:-}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      ENCRYPTION_KEYS: ${ENCRYPTION_KEYS}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@unqueue.dev}
      PORT: ${PORT:-3001}
      NODE_ENV: ${NODE_ENV:-production}
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const port=process.env.PORT||3001;fetch('http://127.0.0.1:'+port+'/health').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    restart: unless-stopped

  platform:
    build:
      context: .
      dockerfile: apps/platform/Dockerfile
      args:
        DOPPLER_TOKEN: ${DOPPLER_TOKEN:-}
        DOPPLER_PROJECT: ${DOPPLER_PROJECT:-unqueue}
        DOPPLER_CONFIG: ${DOPPLER_CONFIG:-prd}
        VITE_API_URL: ${VITE_API_URL:-}
    ports:
      - "${PLATFORM_PORT:-5174}:80"
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1/"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    restart: unless-stopped
